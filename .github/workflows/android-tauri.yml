name: android-tauri-build

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: "Android build variant"
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
      android_targets:
        description: "Rust Android targets"
        required: true
        default: aarch64
        type: choice
        options:
          - aarch64
          - all
      package_kind:
        description: "Android package kind"
        required: true
        default: apk
        type: choice
        options:
          - apk
          - apk-aab

permissions:
  contents: read

concurrency:
  group: android-tauri-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_NDK_VERSION: 28.2.13676358

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          run_sdkmanager_with_yes() {
            set +e
            yes | sdkmanager "$@"
            local sdkmanager_status=${PIPESTATUS[1]}
            set -e
            return "${sdkmanager_status}"
          }

          run_sdkmanager_with_yes --licenses >/dev/null
          run_sdkmanager_with_yes --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Configure Android NDK toolchain
        shell: bash
        run: |
          ndk_toolchain="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "${ndk_toolchain}" >> "${GITHUB_PATH}"

          {
            echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
            echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"

            echo "CC_aarch64_linux_android=${ndk_toolchain}/aarch64-linux-android24-clang"
            echo "CXX_aarch64_linux_android=${ndk_toolchain}/aarch64-linux-android24-clang++"
            echo "AR_aarch64_linux_android=${ndk_toolchain}/llvm-ar"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${ndk_toolchain}/aarch64-linux-android24-clang"

            echo "CC_armv7_linux_androideabi=${ndk_toolchain}/armv7a-linux-androideabi24-clang"
            echo "CXX_armv7_linux_androideabi=${ndk_toolchain}/armv7a-linux-androideabi24-clang++"
            echo "AR_armv7_linux_androideabi=${ndk_toolchain}/llvm-ar"
            echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=${ndk_toolchain}/armv7a-linux-androideabi24-clang"

            echo "CC_i686_linux_android=${ndk_toolchain}/i686-linux-android24-clang"
            echo "CXX_i686_linux_android=${ndk_toolchain}/i686-linux-android24-clang++"
            echo "AR_i686_linux_android=${ndk_toolchain}/llvm-ar"
            echo "CARGO_TARGET_I686_LINUX_ANDROID_LINKER=${ndk_toolchain}/i686-linux-android24-clang"

            echo "CC_x86_64_linux_android=${ndk_toolchain}/x86_64-linux-android24-clang"
            echo "CXX_x86_64_linux_android=${ndk_toolchain}/x86_64-linux-android24-clang++"
            echo "AR_x86_64_linux_android=${ndk_toolchain}/llvm-ar"
            echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=${ndk_toolchain}/x86_64-linux-android24-clang"
          } >> "${GITHUB_ENV}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ui/lianghua_web_feat/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            ui/lianghua_web_feat/src-tauri -> target

      - name: Install Cargo Tauri CLI
        run: cargo install tauri-cli --locked --version 2.10.1

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install frontend dependencies
        working-directory: ui/lianghua_web_feat
        run: npm ci

      - name: Build Tauri app (Android)
        working-directory: ui/lianghua_web_feat
        shell: bash
        run: |
          args=(android build --ci)

          if [ "${{ inputs.package_kind }}" = "apk-aab" ]; then
            args+=(--apk --aab)
          else
            args+=(--apk)
          fi

          if [ "${{ inputs.build_variant }}" = "debug" ]; then
            args+=(--debug)
          fi

          if [ "${{ inputs.android_targets }}" = "aarch64" ]; then
            args+=(--target aarch64)
          fi

          npm run tauri -- "${args[@]}"

      - name: Upload Android bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android-${{ inputs.build_variant }}-${{ inputs.android_targets }}
          path: |
            ui/lianghua_web_feat/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            ui/lianghua_web_feat/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error
