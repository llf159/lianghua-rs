# Do not set DUCKDB_LIB_DIR globally, otherwise Android targets try to link host x86_64 libduckdb.
[env]
CC_aarch64_linux_android = { value = "/home/lmingyuanl/Android/Sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang", force = false }
CXX_aarch64_linux_android = { value = "/home/lmingyuanl/Android/Sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++", force = false }
AR_aarch64_linux_android = { value = "/home/lmingyuanl/Android/Sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar", force = false }

# Desktop Linux builds can still discover /usr/local/libduckdb via linker search path.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-L", "native=/usr/local/lib"]
